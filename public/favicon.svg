<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Crema card -->
	<rect width="128" height="128" fill="#F2E6D8" rx="22" />
	<!-- Chamorro mark (pork shank) — derived from the Distrito Chamorro logo -->
	<g transform="translate(4 0)">
		<!-- Meat body -->
		<ellipse cx="48" cy="68" rx="32" ry="30" fill="#8C3A21" />
		<!-- Bone shaft -->
		<rect x="76" y="56" width="24" height="16" rx="3" fill="#8C3A21" />
		<!-- Bone knuckle (two lobes at the tip) -->
		<circle cx="106" cy="52" r="10" fill="#8C3A21" />
		<circle cx="106" cy="74" r="10" fill="#8C3A21" />
		<!-- Bone cross-section inside the meat -->
		<circle cx="34" cy="68" r="8" fill="#F2E6D8" />
		<circle cx="34" cy="68" r="3" fill="#8C3A21" />
	</g>
</svg>
